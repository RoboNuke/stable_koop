# Run
run_name: "construct_pendulum"

# Environment
env_name: "Pendulum-v1"
num_trajectories: 200
max_episode_steps: 200

# Model
state_dim: 3
action_dim: 1
latent_dim: 8
k_type: "normalized" #"cayley", "schur", "normalized"
rho: 1.2
encoder_type: "cayley"  # "linear" or "cayley"
encoder_spec_norm: false
encoder_latent: 16
init_b_in_a: True  # initialize B in A eigenbasis (only effective with two-step training)

# Policy
no_base_policy: true  # if true, use random actions instead of PD policy
kp: 10.0
kd: 2.0

# Perturbation (random actions to excite the system that represent possible residual actions)
perturb_scale: 1.0 # multiplier on max action
fix_perturb_range: false
hold_steps: 5  # number of steps to hold each sampled perturbation before resampling

# LQR / Stability
q_scale: 1
r_scale: 1
max_tracking_error_x: 0.3 # define by success bounds (1-cos(15), sin(15), 1)
max_displacement_x: 0.57 # define as maximum possible displacement of system (0.4, 0.4, 0.8)

# Training
horizon: 5
batch_size: 2048 #1024
lr: 1.0e-2
weight_decay: 1.0e-5
num_epochs: 100
loss_threshold: 0.003 #0.003 works with pred_weight=10
scheduler_step: 100
scheduler_gamma: 0.5
riemannian_optimizer: true  # use geoopt RiemannianAdam instead of Adam
vectorize_rollout: true  # use closed-form vectorized prediction rollout (faster but more memory)
torch_compile: false  # use torch.compile to fuse GPU kernels (slower first epoch, faster after)

# losses
recon_weight: 1.0
pred_weight: 1.0

controllability_loss: false
ctrl_weight: 0.1 #0.05 

bi_lipschitz_loss: true
bilip_weight: 2.0
bilip_m_target: 1.0

spectral_loss: false
spectral_weight: 0.01

normality_loss: false
normality_weight: 2.0

cl_normality_loss: false
cl_normality_weight: 1.0

b_eigen_loss: False
b_eigen_weight: 1.0
b_eigen_min_scale: 0.3

eig_spread_loss: True
eig_spread_weight: 1.0
eig_spread_min_gap: 0.1

upper_lipschitz_loss: false
upper_lip_weight: 1.0
upper_lip_m_max: 1.25


# Eval
eval_num_trajectories: 200
eval_max_steps: 200
eval_seed: 42
success_angle_deg: 15.0
success_max_thdot: 1.0
success_hold_steps: 20

# Logging / checkpointing
log_interval: 10
checkpoint_dir: "checkpoints/pendulum_h20"
seed: 42
